<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Project Xenon</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://js.puter.com/v2/"></script>

</head>
<body>
<div class="container">

    <div class="head">
        <h1>Project Xenon</h1>
        <div class="links">
            <a href="https://github.com/that0therguy/xenon">Github Repository</a>

        </div>
    </div>
    <div class="bigbody">
        <div class="body">
            <div class="left">
                <div class="leftop">
                    <h2>Inventory</h2>
                    <img src="delete.png" alt="delete" height="24" class="master_delete">
                </div>
                <ul class="game_list">


                </ul>
                <div class="addgames">
                    <input class="input add_input" type="text" placeholder="Game Name">
                    <input class="input key_input" type="password" placeholder="Key">

                    <div class="type">
                        <button class="gametype selected_type" id="game">Game</button>
                        <button class="gametype" id="dlc">DLC</button>
                    </div>
                    <button class="add_button">></button>
                </div>
            </div>
            <div class="right">
                <div class="rightcontent">

                </div>
            </div>
        </div>
    </div>



    <div class="legs"></div>

</div>
<script src="index.js"></script>

</body>
</html>
